name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 9 * * 1' # Segunda-feira às 9h UTC
    - cron: '0 9 * * 4' # Quinta-feira às 9h UTC
  workflow_dispatch:

jobs:
  ping:
    name: Ping Supabase
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Supabase client
        run: npm install @supabase/supabase-js

      - name: Ping Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          node -e "
          const { createClient } = require('@supabase/supabase-js');
          const supabase = createClient(process.env.SUPABASE_URL, process.env.SUPABASE_KEY);
          supabase.from('settings').select('key').limit(1).then(({ data, error }) => {
            if (error) { console.error('Ping falhou:', error.message); process.exit(1); }
            console.log('Supabase ativo. Dados:', JSON.stringify(data));
          });
          "
