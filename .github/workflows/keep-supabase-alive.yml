name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 9 * * 1' # Segunda-feira às 9h UTC
    - cron: '0 9 * * 4' # Quinta-feira às 9h UTC
  workflow_dispatch:     # Permite rodar manualmente pelo GitHub

jobs:
  ping:
    name: Ping Supabase
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase database
        uses: actions/github-script@v7
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        with:
          script: |
            const { createClient } = await import('https://esm.sh/@supabase/supabase-js@2')

            const url = process.env.SUPABASE_URL
            const key = process.env.SUPABASE_KEY

            if (!url || !key) {
              core.setFailed('❌ SUPABASE_URL ou SUPABASE_KEY não configurados nos secrets.')
              return
            }

            const supabase = createClient(url, key)

            const { data, error } = await supabase
              .from('settings')
              .select('key')
              .limit(1)

            if (error) {
              core.setFailed(`❌ Ping falhou: ${error.message}`)
            } else {
              console.log('✅ Supabase respondeu com sucesso. Projeto ativo.')
              console.log(`   Dados recebidos: ${JSON.stringify(data)}`)
            }
